<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property OS — Giriş</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
  background:#F5F5F7;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
[data-theme="dark"] body{background:#000}
.card{
  background:#fff;border-radius:20px;padding:36px 32px;
  width:360px;border:0.5px solid rgba(0,0,0,0.08);
}
[data-theme="dark"] .card{background:#1C1C1E;border-color:rgba(255,255,255,0.08)}
.logo{width:40px;height:40px;background:#000;border-radius:11px;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
[data-theme="dark"] .logo{background:#fff}
h2{font-size:22px;font-weight:500;color:#1D1D1F;letter-spacing:-0.4px;margin-bottom:4px}
[data-theme="dark"] h2{color:#F5F5F7}
p{font-size:13px;color:#6E6E73;margin-bottom:24px}
label{font-size:11px;color:#6E6E73;text-transform:uppercase;letter-spacing:0.4px;display:block;margin-bottom:5px}
input{
  width:100%;padding:10px 13px;border:0.5px solid rgba(0,0,0,0.14);
  border-radius:9px;font-size:14px;font-family:inherit;
  background:#F5F5F7;color:#1D1D1F;margin-bottom:14px;
  transition:border-color 0.15s;
}
[data-theme="dark"] input{background:#2C2C2E;border-color:rgba(255,255,255,0.14);color:#F5F5F7}
input:focus{outline:none;border-color:#000;background:#fff}
[data-theme="dark"] input:focus{border-color:#fff;background:#3A3A3C}
button{
  width:100%;padding:12px;background:#000;color:#fff;
  border:none;border-radius:20px;font-size:15px;font-weight:500;
  font-family:inherit;cursor:pointer;transition:opacity 0.1s;
}
[data-theme="dark"] button{background:#fff;color:#000}
button:hover{opacity:0.85}
button:disabled{opacity:0.5;cursor:not-allowed}
.error{
  font-size:13px;color:#A32D2D;background:#FCEBEB;
  border-radius:9px;padding:10px 13px;margin-bottom:14px;display:none;
}
.forgot{font-size:12px;color:#6E6E73;text-align:right;margin-top:-8px;margin-bottom:16px;cursor:pointer}
.forgot:hover{color:#000}
footer{font-size:11px;color:#AEAEB2;text-align:center;margin-top:24px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="1" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.6"/>
      <path d="M5 7V6a4 4 0 018 0v1" stroke="white" stroke-width="1.6"/>
    </svg>
  </div>
  <h2>Hoş Geldiniz</h2>
  <p>Property OS'e giriş yapın</p>
  <div id="error-box" class="error"></div>
  <label>E-Posta</label>
  <input type="email" id="email" placeholder="ornek@mail.com" autocomplete="email">
  <label>Şifre</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  <div class="forgot" onclick="handleForgot()">Şifremi unuttum</div>
  <button id="btn-login" onclick="handleLogin()">Giriş Yap</button>
  <footer>Duay Global Trade Company · v1.0</footer>
</div>

<script type="module">
import { login, onSessionChange, resetPassword } from '/PropertyOS/src/core/auth.js';

onSessionChange(
  () => { window.location.href = '/PropertyOS/pages/app.html'; },
  () => {}
);

window.handleLogin = async () => {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errBox   = document.getElementById('error-box');
  const btn      = document.getElementById('btn-login');
  errBox.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Giriş yapılıyor...';
  try {
    await login(email, password);
  } catch(e) {
    errBox.textContent  = 'E-posta veya şifre hatalı.';
    errBox.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Giriş Yap';
  }
};

window.handleForgot = async () => {
  const email = document.getElementById('email').value.trim();
  if (!email) { alert('E-posta adresinizi girin.'); return; }
  try {
    await resetPassword(email);
    alert('Şifre sıfırlama e-postası gönderildi.');
  } catch { alert('Hata oluştu. E-postayı kontrol edin.'); }
};

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.handleLogin();
});
</script>
</body>
</html>
