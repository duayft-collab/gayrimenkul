<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>TradeOS</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<style>
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f3;margin:0}
.loader{text-align:center}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#1a1a1a;margin:0 3px;animation:bounce 1s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div class="loader">
  <div style="font-size:18px;font-weight:500;margin-bottom:16px">TradeOS</div>
  <div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<script>
auth.onAuthStateChanged(user => {
  if (user) window.location.href = "pages/dashboard.html";
  else window.location.href = "pages/login.html";
});
</script>
</body>
</html>
