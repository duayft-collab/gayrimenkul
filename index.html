<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f5f3;color:#1a1a1a}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:20px 16px 14px;border-bottom:1px solid #e0e0e0}
.logo-title{font-size:15px;font-weight:600}
.logo-sub{font-size:11px;color:#999;margin-top:2px}
.sidebar-nav{padding:10px 8px;flex:1}
.nav-section{font-size:10px;color:#bbb;padding:10px 10px 4px;letter-spacing:.05em;text-transform:uppercase}
.nav-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#666;margin-bottom:1px;transition:background .1s}
.nav-item:hover{background:#f5f5f3}
.nav-item.active{background:#f0f0f0;color:#1a1a1a;font-weight:500}
.sidebar-footer{padding:12px 14px;border-top:1px solid #e0e0e0;display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#e3f0ff;color:#1a5fb4;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.user-email{font-size:11px;color:#666;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{background:none;border:none;cursor:pointer;color:#999;font-size:14px;padding:4px}
.main-area{flex:1;overflow-y:auto}
#page-content{min-height:100%}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<script src="js/app.js"></script>
</body>
</html>
