<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title data-i18n="app.name">Gayrimenkul Yönetim</title>
  <link rel="stylesheet" href="../assets/css/theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .logo-area {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--sidebar-border);
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--btn-primary-bg);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      color: var(--btn-primary-text);
      flex-shrink: 0;
    }
    .logo-title {
      font-size: 13.5px; font-weight: 600;
      color: var(--text-primary); letter-spacing: -0.2px;
    }
    .logo-sub {
      font-size: 10.5px; color: var(--text-tertiary);
    }

    /* ── Nav ─────────────────────────────────────────────── */
    .nav-section { padding: 12px 0; }
    .nav-label {
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-tertiary); padding: 0 14px 5px; font-weight: 500;
    }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; cursor: pointer;
      color: var(--sidebar-text); font-size: 13px;
      border-radius: 6px; margin: 1px 8px;
      transition: background 0.1s, color 0.1s;
      user-select: none;
    }
    .nav-item:hover  { background: var(--sidebar-hover-bg); color: var(--text-primary); }
    .nav-item.active { background: var(--sidebar-active-bg); color: var(--sidebar-active-text); }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-icon { font-size: 13px; width: 16px; text-align: center; opacity: 0.6; flex-shrink: 0; }
    .nav-divider { margin: 6px 8px; border: none; border-top: 1px solid var(--sidebar-border); }

    .sidebar-footer {
      margin-top: auto; padding: 14px 18px;
      border-top: 1px solid var(--sidebar-border);
    }
    .user-row { display: flex; align-items: center; gap: 9px; }
    .user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--btn-primary-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      color: var(--btn-primary-text); flex-shrink: 0;
    }
    .user-name  { font-size: 12.5px; font-weight: 500; color: var(--text-primary); }
    .user-role  { font-size: 10.5px; color: var(--text-tertiary); }

    /* ── Ana İçerik ──────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--topbar-border);
      padding: 0 26px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .page-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .content { flex: 1; overflow-y: auto; padding: 22px 26px; }

    /* ── Butonlar ────────────────────────────────────────── */
    .btn {
      font-family: inherit; cursor: pointer; font-size: 12.5px; font-weight: 500;
      border-radius: 6px; transition: all 0.1s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-primary {
      background: var(--btn-primary-bg); color: var(--btn-primary-text);
      border: none; padding: 7px 15px;
    }
    .btn-primary:hover { background: var(--btn-primary-hover); }
    .btn-outline {
      background: var(--btn-outline-bg); color: var(--btn-outline-text);
      border: 1px solid var(--btn-outline-border); padding: 6px 13px;
    }
    .btn-outline:hover {
      border-color: var(--btn-outline-hover-border);
      color: var(--btn-outline-hover-text);
    }
    .btn-sm { font-size: 11.5px; padding: 5px 11px; }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); font-size: 16px; padding: 4px 8px;
      border-radius: 5px;
    }
    .btn-icon:hover { background: var(--bg-tertiary); color: var(--text-primary); }

    /* ── Bağlantı Banner ─────────────────────────────────── */
    #offline-banner {
      display: none; background: var(--color-warning-bg);
      border-bottom: 1px solid var(--color-warning-border);
      color: var(--color-warning-text);
      padding: 8px 26px; font-size: 12.5px; font-weight: 500;
      text-align: center;
    }
    #offline-banner.show { display: block; }

    /* ── Sayfa içerik alanı ──────────────────────────────── */
    #page-content { min-height: 200px; }

    /* ── Metrik Kartlar ──────────────────────────────────── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .metric-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 17px 19px;
    }
    .metric-label {
      font-size: 10.5px; color: var(--text-tertiary);
      font-weight: 500; letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 7px;
    }
    .metric-value {
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.5px; line-height: 1;
    }
    .metric-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; }
    .up { color: var(--color-success-text); font-weight: 500; }
    .dn { color: var(--color-error-text); font-weight: 500; }

    /* ── Kart ────────────────────────────────────────────── */
    .card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 8px; margin-bottom: 14px;
      box-shadow: var(--card-shadow);
    }
    .card-header {
      padding: 14px 18px; border-bottom: 1px solid var(--card-border);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .card-title { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; }
    .card-body  { padding: 0; }
    .card-body-padded { padding: 14px 18px; }

    /* ── İki Kolon ───────────────────────────────────────── */
    .two-col {
      display: grid; grid-template-columns: 1.65fr 1fr;
      gap: 14px; margin-bottom: 14px;
    }
    .col-stack { display: flex; flex-direction: column; gap: 14px; }

    /* ── Tablo ───────────────────────────────────────────── */
    .tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .tbl th {
      text-align: left; padding: 9px 15px;
      font-size: 10.5px; font-weight: 600; color: var(--text-tertiary);
      letter-spacing: 0.7px; text-transform: uppercase;
      border-bottom: 1px solid var(--table-border);
      background: var(--table-header-bg); white-space: nowrap;
    }
    .tbl td {
      padding: 11px 15px; border-bottom: 1px solid var(--table-border);
      vertical-align: middle;
    }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tbody tr { cursor: pointer; }
    .tbl tbody tr:hover td { background: var(--table-row-hover); }
    .tbl .num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }

    /* ── Durum Etiketleri ────────────────────────────────── */
    .tag {
      font-size: 10.5px; padding: 2px 8px; border-radius: 4px;
      font-weight: 500; display: inline-flex; align-items: center;
      gap: 3px; white-space: nowrap;
    }
    .tag-green   { background: var(--color-success-bg); color: var(--color-success-text); }
    .tag-red     { background: var(--color-error-bg);   color: var(--color-error-text); }
    .tag-warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .tag-info    { background: var(--color-info-bg);    color: var(--color-info-text); }
    .tag-gray    { background: var(--bg-tertiary);      color: var(--text-secondary); }

    /* ── Sekmeler ────────────────────────────────────────── */
    .tabs {
      display: flex; border-bottom: 1px solid var(--card-border);
      background: var(--card-bg); padding: 0 18px;
    }
    .tab {
      padding: 11px 15px; font-size: 12.5px; cursor: pointer;
      color: var(--text-tertiary); border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 0.1s; user-select: none;
    }
    .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 600; }
    .tab:hover:not(.active) { color: var(--text-secondary); }

    /* ── Filtre ──────────────────────────────────────────── */
    .filter-bar { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-chip {
      padding: 5px 12px; border-radius: 5px; font-size: 12px; cursor: pointer;
      border: 1px solid var(--border-light); background: var(--card-bg);
      color: var(--text-secondary); font-family: inherit; transition: all 0.1s;
      user-select: none;
    }
    .filter-chip.active { background: var(--btn-primary-bg); color: var(--btn-primary-text); border-color: var(--btn-primary-bg); }
    .filter-chip:hover:not(.active) { border-color: var(--border-medium); color: var(--text-primary); }
    .search-box {
      padding: 6px 11px; border: 1px solid var(--input-border);
      border-radius: 6px; font-family: inherit; font-size: 12.5px;
      color: var(--input-text); background: var(--input-bg); outline: none; width: 185px;
    }
    .search-box:focus { border-color: var(--input-focus-border); }

    /* ── Mülk Grid ───────────────────────────────────────── */
    .mulk-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 13px;
    }
    .mulk-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 8px; overflow: hidden; cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .mulk-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
    .mulk-thumb {
      height: 105px; display: flex; align-items: center;
      justify-content: center; font-size: 36px;
      background: var(--bg-tertiary);
    }
    .mulk-card-body { padding: 11px 13px; }
    .mulk-card-title { font-size: 12.5px; font-weight: 600; margin-bottom: 2px; letter-spacing: -0.1px; }
    .mulk-card-loc   { font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px; }
    .mulk-card-footer { display: flex; align-items: center; justify-content: space-between; }
    .mulk-card-price  { font-size: 13px; font-weight: 600; }

    /* ── Progress ────────────────────────────────────────── */
    .progress { width: 100%; height: 3px; background: var(--progress-bg); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; background: var(--progress-fill); transition: width 0.4s; }

    /* ── Liste Satırı ────────────────────────────────────── */
    .list-row {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 18px; border-bottom: 1px solid var(--card-border);
      cursor: pointer;
    }
    .list-row:last-child { border-bottom: none; }
    .list-row:hover { background: var(--bg-secondary); }
    .list-icon {
      width: 33px; height: 33px; border-radius: 6px;
      background: var(--bg-tertiary); display: flex; align-items: center;
      justify-content: center; font-size: 15px; flex-shrink: 0;
      border: 1px solid var(--border-light);
    }
    .list-main { flex: 1; min-width: 0; }
    .list-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-sub  { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
    .list-right { text-align: right; flex-shrink: 0; }
    .list-price { font-size: 12.5px; font-weight: 600; }

    /* ── Özet Kartlar ────────────────────────────────────── */
    .sum-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
    .sum-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 14px 17px;
    }
    .sum-label { font-size: 10.5px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; margin-bottom: 4px; }
    .sum-val   { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
    .sum-note  { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }

    /* ── Dağılım ─────────────────────────────────────────── */
    .dagil-row { display: flex; align-items: center; gap: 9px; padding: 6px 0; border-bottom: 1px solid var(--border-light); }
    .dagil-row:last-child { border-bottom: none; }
    .dagil-name  { font-size: 12px; color: var(--text-secondary); width: 75px; flex-shrink: 0; }
    .dagil-bar   { flex: 1; height: 3px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; }
    .dagil-fill  { height: 100%; border-radius: 2px; background: var(--text-primary); }
    .dagil-pct   { font-size: 11.5px; font-weight: 600; width: 30px; text-align: right; flex-shrink: 0; }

    /* ── ROI Badge ───────────────────────────────────────── */
    .roi { background: var(--color-success-bg); color: var(--color-success-text); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }

    /* ── Chart ───────────────────────────────────────────── */
    .chart-wrap   { display: flex; align-items: flex-end; gap: 5px; height: 130px; }
    .chart-col    { display: flex; align-items: flex-end; gap: 2px; flex: 1; }
    .chart-bar    { border-radius: 3px 3px 0 0; min-height: 3px; }
    .chart-income { background: var(--chart-bar-income); }
    .chart-expense{ background: var(--chart-bar-expense); }
    .chart-labels { display: flex; margin-top: 5px; }
    .chart-lbl    { flex: 1; text-align: center; font-size: 9.5px; color: var(--text-tertiary); }
    .chart-legend { display: flex; gap: 14px; font-size: 11.5px; color: var(--text-tertiary); margin-bottom: 8px; }
    .legend-dot   { width: 9px; height: 9px; border-radius: 2px; display: inline-block; margin-right: 3px; }

    /* ── Modal ───────────────────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.28); z-index: 500;
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--card-bg); border-radius: 10px;
      width: 520px; max-width: 96vw; max-height: 92vh;
      overflow-y: auto; border: 1px solid var(--card-border);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .modal-sm { width: 420px; }
    .modal-header {
      padding: 18px 22px 15px; border-bottom: 1px solid var(--card-border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--card-bg); z-index: 1;
    }
    .modal-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
    .modal-close {
      background: var(--bg-tertiary); border: 1px solid var(--border-light);
      border-radius: 5px; padding: 3px 9px; cursor: pointer;
      font-size: 13px; color: var(--text-secondary); line-height: 1.4;
    }
    .modal-body   { padding: 18px 22px; }
    .modal-footer {
      padding: 13px 22px; border-top: 1px solid var(--card-border);
      display: flex; justify-content: flex-end; gap: 8px;
      position: sticky; bottom: 0; background: var(--card-bg);
    }

    /* ── Form ────────────────────────────────────────────── */
    .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
    .form-group { margin-bottom: 13px; }
    .form-label {
      font-size: 11px; font-weight: 500; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; display: block;
    }
    .form-control {
      width: 100%; padding: 8px 11px;
      border: 1px solid var(--input-border); border-radius: 6px;
      font-family: inherit; font-size: 13px;
      color: var(--input-text); background: var(--input-bg); outline: none;
      transition: border-color 0.1s;
    }
    .form-control:focus { border-color: var(--input-focus-border); background: var(--bg-primary); }
    textarea.form-control { resize: vertical; min-height: 68px; }

    /* ── Detay Panel ─────────────────────────────────────── */
    .detail-overlay {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.18); align-items: flex-start; justify-content: flex-end;
    }
    .detail-overlay.open { display: flex; }
    .detail-panel {
      width: 400px; height: 100vh;
      background: var(--card-bg); border-left: 1px solid var(--card-border);
      overflow-y: auto; box-shadow: -3px 0 16px rgba(0,0,0,0.08);
    }
    .detail-header {
      padding: 16px 20px; border-bottom: 1px solid var(--card-border);
      display: flex; align-items: flex-start; justify-content: space-between;
      position: sticky; top: 0; background: var(--card-bg); z-index: 1;
    }
    .detail-title { font-size: 13.5px; font-weight: 600; }
    .detail-body  { padding: 18px 20px; }
    .detail-row   { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-light); }
    .detail-row:last-child { border-bottom: none; }
    .detail-key   { font-size: 12px; color: var(--text-tertiary); }
    .detail-val   { font-size: 12px; font-weight: 500; text-align: right; }
    .detail-section { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; }

    /* ── Boş Durum ───────────────────────────────────────── */
    .empty { text-align: center; padding: 40px 20px; color: var(--text-tertiary); }
    .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }
    .empty-text { font-size: 13px; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 900px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col      { grid-template-columns: 1fr; }
      .sum-grid     { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 680px) {
      .sidebar { display: none; }
      .metrics-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

      <span class="nav-icon">⚙</span><span data-i18n="nav.admin">Admin Panel</span>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-row" id="user-row">
      <div class="user-avatar" id="user-avatar">—</div>
      <div>
        <div class="user-name" id="user-name">—</div>
        <div class="user-role" id="user-role">—</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="btn btn-outline btn-sm" data-theme-toggle onclick="handleThemeToggle()" style="flex:1;font-size:11px">
        <span data-theme-icon>☾</span>
      </button>
      <button class="btn btn-outline btn-sm" onclick="handleLangToggle()" id="lang-btn" style="flex:1;font-size:11px">🌐</button>
      <button class="btn btn-outline btn-sm" onclick="handleLogout()" style="flex:1;font-size:11px" data-i18n-title="nav.logout" title="Çıkış">⏻</button>
    </div>
  </div>
</aside>

<!-- ══ MAIN ══ -->
<div class="main">
  <header class="topbar">
    <div class="page-title" id="page-title" data-i18n="nav.dashboard">Ana Pano</div>
    <div class="topbar-right">
      <span style="font-size:11.5px;color:var(--text-tertiary)" id="today-date"></span>
      <div style="position:relative;display:inline-block">
        <button class="btn-icon" onclick="window._notifToggle()" title="Bildirimler" style="font-size:18px">🔔</button>
        <span id="notif-badge" style="display:none;position:absolute;top:0;right:0;background:#ef4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;align-items:center;justify-content:center;pointer-events:none">0</span>
      </div>
      <button class="btn btn-primary btn-sm" id="topbar-add-btn" onclick="topbarAdd()">
        + <span id="topbar-add-label" data-i18n="mulkler.add">Mülk Ekle</span>
      </button>
    </div>
  </header>

  <main class="content">
    <div id="page-content">
      <!-- Modüller buraya render edilir -->
      <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text" data-i18n="ui.loading">Yükleniyor...</div></div>
    </div>
  </main>
</div>

<!-- ══ MODALLER — Modüller tarafından doldurulur ══ -->
<div id="modal-container"></div>
<div class="detail-overlay" id="detail-overlay" onclick="handleDetailOverlayClick(event)">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<!-- ══ SCRIPTS ══ -->
<script type="module">
  import { onSessionChange, logout, isAdmin, getCurrentProfile } from '../src/core/auth.js';
  import { initRouter, navigate as routerNavigate }              from '../src/ui/router.js';
  import { initTheme, toggleTheme }                              from '../src/ui/theme-toggle.js';
  import { initLang, setLang, getLang, t, applyTranslations }    from '../src/core/i18n.js';
  import { showOfflineToast, hideOfflineToast }                   from '../src/ui/toast.js';
  import { APP_CONFIG }                                           from '../config/app-config.js';
  import { initNotifications, renderNotificationPanel }          from '../src/core/notifications.js';

  // ── Global yardımcılar ──────────────────────────────────
  window.navigate             = routerNavigate;
  window.handleThemeToggle    = () => toggleTheme();
  window.handleDetailOverlayClick = (e) => {
    if (e.target === document.getElementById('detail-overlay'))
      document.getElementById('detail-overlay').classList.remove('open');
  };

  // ── Dil ─────────────────────────────────────────────────
  window.handleLangToggle = () => {
    setLang(getLang() === 'tr' ? 'en' : 'tr');
    document.getElementById('lang-btn').textContent = '🌐 ' + (getLang() === 'tr' ? 'EN' : 'TR');
  };

  // ── Çıkış ───────────────────────────────────────────────
  window.handleLogout = async () => { await logout(); };

  // ── Başlangıç ───────────────────────────────────────────
  initTheme();
  initLang();
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('tr-TR', { day:'2-digit', month:'long', year:'numeric' });

  // ── Oturum Kontrolü ─────────────────────────────────────
  onSessionChange(
    async (user, profile) => {
      // Kullanıcı bilgilerini sidebar'a yaz
      const initials = (profile.displayName || profile.email || '?')
        .split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('user-avatar').textContent = initials;
      document.getElementById('user-name').textContent   = profile.displayName || profile.email;
      document.getElementById('user-role').textContent   =
        t(`admin.roles.${profile.role}`) || profile.role;

      // Admin nav göster
      if (profile.role === APP_CONFIG.roles.ADMIN) {
        document.getElementById('admin-nav').style.display    = '';
        document.getElementById('admin-divider').style.display = '';
      }

      // Dil / Tema kullanıcı tercihine göre uygula
      initLang(profile);
      initTheme(profile);

      // Bildirimler başlat
      initNotifications();
      window._notifToggle = renderNotificationPanel;

      // Router başlat
      initRouter(async (routeId, mod) => {
        if (mod && typeof mod.render === 'function') {
          await mod.render(document.getElementById('page-content'), profile);
        }
        // Topbar butonunu güncelle
        const addLabels = {
          mulkler:     'mulkler.add',
          sozlesmeler: 'sozlesmeler.add',
          kira:        'kira.addPayment',
          kiracilar:   'sozlesmeler.add',
          alisatis:    'alisatis.add',
          raporlar:    'raporlar.exportPdf',
        };
        const labelKey = addLabels[routeId];
        document.getElementById('topbar-add-label').setAttribute('data-i18n', labelKey || 'mulkler.add');
        document.getElementById('topbar-add-label').textContent = labelKey ? t(labelKey) : t('mulkler.add');
      });
    },
    () => {
      // Oturum yok — giriş sayfasına yönlendir
      window.location.href = '/pages/index.html';
    }
  );

  // Topbar "Ekle" butonu — aktif modüle yönlendirir
  window.topbarAdd = () => {
    const btn = document.getElementById(`add-btn-${window.location.hash.replace('#','')}`);
    if (btn) btn.click();
  };

  // ── Çevrimiçi/Çevrimdışı Algılama ──────────────────────
  window.addEventListener('offline', () => {
    document.getElementById('offline-banner').classList.add('show');
    showOfflineToast(t('ui.offlineBanner'));
  });
  window.addEventListener('online', () => {
    document.getElementById('offline-banner').classList.remove('show');
    hideOfflineToast();
    // Kısa bildirim
    import('../src/ui/toast.js').then(({ showToast }) =>
      showToast('success', t('ui.onlineBanner'), 4000)
    );
  });
</script>

</body>
</html>
