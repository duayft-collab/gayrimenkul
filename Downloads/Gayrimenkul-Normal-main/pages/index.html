<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title data-i18n="app.name">Gayrimenkul Yönetim</title>
  <link rel="stylesheet" href="../assets/css/theme.css">
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Kart ───────────────────────────────────────────── */
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      padding: 36px 32px 28px;
      box-shadow: var(--card-shadow);
    }

    /* ── Logo ───────────────────────────────────────────── */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--btn-primary-bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--btn-primary-text);
      flex-shrink: 0;
    }
    .logo-text-wrap { line-height: 1.2; }
    .logo-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.2px;
    }
    .logo-sub {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    /* ── Başlık ─────────────────────────────────────────── */
    .login-heading {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.4px;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    /* ── Form ───────────────────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--input-border);
      border-radius: 7px;
      font-family: inherit;
      font-size: 13.5px;
      color: var(--input-text);
      background: var(--input-bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--input-focus-border); }

    /* ── Buton ──────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: 10px;
      background: var(--btn-primary-bg);
      color: var(--btn-primary-text);
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: -0.1px;
    }
    .btn-login:hover   { background: var(--btn-primary-hover); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Şifremi Unuttum ────────────────────────────────── */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--text-tertiary);
      text-decoration: none;
      margin-top: -8px;
      margin-bottom: 16px;
      cursor: pointer;
    }
    .forgot-link:hover { color: var(--text-primary); }

    /* ── Hata mesajı ────────────────────────────────────── */
    .error-msg {
      background: var(--color-error-bg);
      border: 1px solid var(--color-error-border);
      color: var(--color-error-text);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 12.5px;
      margin-bottom: 14px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ── Araç Çubuğu (Tema/Dil) ─────────────────────────── */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      align-self: flex-end;
    }
    .toolbar-btn {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 5px 12px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .toolbar-btn:hover { border-color: var(--border-medium); color: var(--text-primary); }

    /* ── Footer ─────────────────────────────────────────── */
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--text-tertiary);
      line-height: 1.6;
    }
    .login-footer a {
      color: var(--text-tertiary);
      text-decoration: none;
    }
    .login-footer a:hover { color: var(--text-primary); }
  </style>
</head>
<body>

  <!-- Tema / Dil Araç Çubuğu -->
  <div class="toolbar" style="width:100%;max-width:400px;display:flex;justify-content:flex-end">
    <button class="toolbar-btn" data-theme-toggle onclick="handleThemeToggle()" aria-label="Tema Değiştir">
      <span data-theme-icon>☾</span>
      <span data-theme-label data-i18n="ui.darkMode">Karanlık Mod</span>
    </button>
    <button class="toolbar-btn" onclick="handleLangToggle()" id="lang-btn">
      🌐 EN
    </button>
  </div>

  <!-- Giriş Kartı -->
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">⌂</div>
      <div class="logo-text-wrap">
        <div class="logo-title" data-i18n="app.name">Gayrimenkul Yönetim</div>
        <div class="logo-sub" data-i18n="app.company">Duay Global Trade Company</div>
      </div>
    </div>

    <!-- Başlık -->
    <div class="login-heading" data-i18n="auth.loginWelcome">Hoş Geldiniz</div>
    <div class="login-sub" data-i18n="auth.loginSubtitle">Hesabınıza giriş yapın</div>

    <!-- Hata mesajı -->
    <div class="error-msg" id="login-error"></div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label" for="email" data-i18n="auth.email">E-posta</label>
      <input
        class="form-input"
        id="email"
        type="email"
        autocomplete="email"
        data-i18n-placeholder="auth.email"
        placeholder="E-posta"
        required
      >
    </div>

    <div class="form-group">
      <label class="form-label" for="password" data-i18n="auth.password">Şifre</label>
      <input
        class="form-input"
        id="password"
        type="password"
        autocomplete="current-password"
        data-i18n-placeholder="auth.password"
        placeholder="Şifre"
        required
      >
    </div>

    <a class="forgot-link" onclick="handleForgotPassword()" data-i18n="auth.forgotPassword">
      Şifremi Unuttum
    </a>

    <button class="btn-login" id="login-btn" onclick="handleLogin()">
      <span data-i18n="auth.loginButton">Giriş Yap</span>
    </button>

  </div>

  <!-- Footer (Anayasa §07 — Statik Versiyon) -->
  <div class="login-footer">
    <div data-i18n="app.company">Duay Global Trade Company</div>
    <div>
      <span data-i18n="ui.version">Versiyon</span>
      <strong id="app-version">v1.0 / 2026-03-23</strong>
    </div>
    <div>
      <a href="mailto:info@duaycor.com">info@duaycor.com</a>
    </div>
  </div>

  <!-- Modules -->
  <script type="module">
    import { login, resetPassword, onSessionChange } from '../src/core/auth.js';
    import { initTheme, toggleTheme, getTheme }       from '../src/ui/theme-toggle.js';
    import { initLang, setLang, getLang, t }           from '../src/core/i18n.js';
    import { APP_CONFIG }                              from '../config/app-config.js';
    import { showToast }                               from '../src/ui/toast.js';

    // ── Başlangıç ─────────────────────────────────────────
    initTheme();
    initLang();
    document.getElementById('app-version').textContent = APP_CONFIG.versionFull;
    _updateLangBtn();

    // ── Oturum Kontrolü ───────────────────────────────────
    onSessionChange(
      (_user, _profile) => {
        // Aktif oturum varsa direkt uygulamaya yönlendir
        window.location.href = '/pages/app.html';
      },
      () => { /* Oturum yok — giriş sayfasında kal */ }
    );

    // ── Enter tuşu ile giriş ──────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    // ── Giriş ─────────────────────────────────────────────
    window.handleLogin = async function () {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const errEl    = document.getElementById('login-error');

      if (!email || !password) {
        errEl.textContent = t('auth.email') + ' / ' + t('auth.password') + ' boş bırakılamaz.';
        errEl.classList.add('show');
        return;
      }

      errEl.classList.remove('show');
      btn.disabled = true;
      btn.querySelector('[data-i18n]').setAttribute('data-i18n', 'auth.loggingIn');
      btn.querySelector('[data-i18n]').textContent = t('auth.loggingIn');

      try {
        await login(email, password);
        window.location.href = '/pages/app.html';
      } catch (err) {
        const code = err?.code || err?.message || '';
        btn.disabled = false;
        btn.querySelector('[data-i18n]').textContent = t('auth.loginButton');
        // handleError zaten toast gösterdi, ek olarak inline göster
        errEl.textContent = document.querySelector('#toast-container')?.
          lastChild?.querySelector('div')?.textContent || t('ui.error');
        errEl.classList.add('show');
      }
    };

    // ── Şifremi Unuttum ───────────────────────────────────
    window.handleForgotPassword = async function () {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showToast('warning', 'Lütfen önce e-posta adresinizi girin.');
        document.getElementById('email').focus();
        return;
      }
      await resetPassword(email);
    };

    // ── Tema ──────────────────────────────────────────────
    window.handleThemeToggle = function () { toggleTheme(); };

    // ── Dil ───────────────────────────────────────────────
    window.handleLangToggle = function () {
      setLang(getLang() === 'tr' ? 'en' : 'tr', false);
      _updateLangBtn();
    };

    function _updateLangBtn() {
      const btn = document.getElementById('lang-btn');
      if (btn) btn.textContent = '🌐 ' + (getLang() === 'tr' ? 'EN' : 'TR');
    }
  </script>

</body>
</html>
